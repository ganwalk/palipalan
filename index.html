<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>palipalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nabla&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050814; /* Dark gloomy background */
            font-family: 'Courier New', Courier, monospace;
        }

        /* Animação da onda pulsante para o texto "palipalan" */
        @keyframes wave {
            0%, 100% { 
                transform: translateY(0); 
                filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
            }
            50% { 
                transform: translateY(-20px); 
                filter: drop-shadow(0 0 25px rgba(255, 230, 0, 0.9)) drop-shadow(0 0 50px rgba(255, 150, 0, 0.6));
            }
        }

        .wave-text {
            display: flex;
            gap: 2px;
            font-family: 'Nabla', system-ui;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            text-transform: lowercase;
            pointer-events: none;
            user-select: none;
        }

        .wave-text span {
            display: inline-block;
            animation: wave 2s infinite ease-in-out;
        }

        /* Delays para criar o efeito de onda passando da esquerda para a direita */
        .wave-text span:nth-child(1) { animation-delay: 0.0s; }
        .wave-text span:nth-child(2) { animation-delay: 0.1s; }
        .wave-text span:nth-child(3) { animation-delay: 0.2s; }
        .wave-text span:nth-child(4) { animation-delay: 0.3s; }
        .wave-text span:nth-child(5) { animation-delay: 0.4s; }
        .wave-text span:nth-child(6) { animation-delay: 0.5s; }
        .wave-text span:nth-child(7) { animation-delay: 0.6s; }
        .wave-text span:nth-child(8) { animation-delay: 0.7s; }
        .wave-text span:nth-child(9) { animation-delay: 0.8s; }

    </style>
    <!-- Import map for Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <!-- Fundo de Horizonte Ambientado (Iframe Desfocado e Espelhado) -->
    <div id="ambient-bg" class="absolute inset-0 overflow-hidden bg-[#12182b] flex justify-center items-center pointer-events-none" style="z-index: 0;">
        <iframe class="w-[150vw] h-[150vh] scale-x-[-1] opacity-40" style="filter: blur(80px); pointer-events: none;" 
        src="https://www.youtube.com/embed/yVWU6NyW0mU?list=RDyVWU6NyW0mU&autoplay=1&mute=1&controls=0&disablekb=1" 
        allow="autoplay" frameborder="0"></iframe>
    </div>

    <!-- 3D Canvas Container -->
    <div id="canvas-container" class="absolute inset-0" style="z-index: 10;"></div>

    <!-- UI Overlay - Texto "palipalan" -->
    <div class="absolute inset-0 pointer-events-none flex justify-center items-start pt-20" style="z-index: 20;">
        <div class="wave-text">
            <span>p</span><span>a</span><span>l</span><span>i</span><span>p</span><span>a</span><span>l</span><span>a</span><span>n</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

        // 1. Scene Setup - Fundo Transparente para revelar o horizonte espelhado
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const fogColor = new THREE.Color(0x12182b);
        // scene.background = fogColor; -> Removido para manter a transparência base
        scene.fog = new THREE.FogExp2(fogColor, 0.06); // O nevoeiro mescla o chão 3D com o fundo de vídeo

        // 2. Camera Setup
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 10); // Visão frontal da TV

        // 3. Renderer Setup (Com Alpha Ativado)
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setClearColor(0x000000, 0); // Torna o WebGL transparente
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // CSS3D Renderer para o iframe do YouTube (Na frente do WebGL)
        const cssRenderer = new CSS3DRenderer();
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
        cssRenderer.domElement.style.position = 'absolute';
        cssRenderer.domElement.style.top = '0px';
        cssRenderer.domElement.style.left = '0px';
        cssRenderer.domElement.style.pointerEvents = 'none';
        cssRenderer.domElement.style.zIndex = '15'; 
        document.body.appendChild(cssRenderer.domElement);

        // 4. Controls Setup
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 20;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;
        controls.minAzimuthAngle = -Math.PI / 3;
        controls.maxAzimuthAngle = Math.PI / 3;
        controls.target.set(0, 1.5, 0);

        // 5. Lighting Setup
        const ambientLight = new THREE.AmbientLight(0x203050, 1.5);
        scene.add(ambientLight);

        const moonLight = new THREE.DirectionalLight(0x4466aa, 0.8);
        moonLight.position.set(-5, 10, 5);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.width = 1024;
        moonLight.shadow.mapSize.height = 1024;
        scene.add(moonLight);

        // Feixe de Luz Amarela
        const beamHeight = 15.0; 
        const beamZ = 3.0; 

        const beamLight = new THREE.SpotLight(0xffdd00, 40.0); 
        beamLight.position.set(0, beamHeight, beamZ); 
        beamLight.target.position.set(0, 1.0, 0); 
        beamLight.angle = Math.PI / 4.5; 
        beamLight.penumbra = 0.6;
        beamLight.castShadow = true;
        beamLight.shadow.mapSize.width = 1024;
        beamLight.shadow.mapSize.height = 1024;
        scene.add(beamLight);
        scene.add(beamLight.target);

        // Geometria visível do feixe de luz
        const beamGeo = new THREE.CylinderGeometry(0.01, 5.5, beamHeight, 32, 1, true);
        beamGeo.translate(0, beamHeight / 2, 0); 
        
        const posAttribute = beamGeo.attributes.position;
        for (let i = 0; i < posAttribute.count; i++) {
            const y = posAttribute.getY(i);
            const zShift = (y / beamHeight) * beamZ; 
            posAttribute.setZ(i, posAttribute.getZ(i) + zShift);
        }
        beamGeo.computeVertexNormals();

        const beamMat = new THREE.ShaderMaterial({
            uniforms: {
                beamColor: { value: new THREE.Color(0xffdd00) },
                beamOpacity: { value: 0.08 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 beamColor;
                uniform float beamOpacity;
                varying vec2 vUv;
                void main() {
                    float fadeBottom = smoothstep(0.0, 0.25, vUv.y);
                    float fadeTop = smoothstep(1.0, 0.6, vUv.y);
                    gl_FragColor = vec4(beamColor, beamOpacity * fadeBottom * fadeTop);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.DoubleSide
        });
        
        const beamMesh = new THREE.Mesh(beamGeo, beamMat);
        scene.add(beamMesh);

        // 6. Chão (Ambiente)
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x0a0a0f,
            roughness: 0.9,
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 7. Tapete Psicadélico (Padrão Geométrico)
        const rugGeo = new THREE.BoxGeometry(6, 0.05, 4);
        
        const rugMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111,
            roughness: 0.7,
            metalness: 0.3
        });

        // Injetando código GLSL Psicadélico Geométrico
        rugMat.onBeforeCompile = (shader) => {
            shader.defines = shader.defines || {};
            shader.defines.USE_UV = '';
            shader.uniforms.time = { value: 0 };
            rugMat.userData.shader = shader; 
            
            shader.fragmentShader = `
                uniform float time;
                ${shader.fragmentShader}
            `.replace(
                `#include <color_fragment>`,
                `#include <color_fragment>
                
                // Padrão Geométrico (Losangos e Quadrados em Grade)
                vec2 uv = vUv * 8.0; 
                
                // Adiciona movimento hipnótico
                uv.x += time * 0.3;
                uv.y += sin(time * 0.5) * 0.2;
                
                // Repetição local
                vec2 grid = fract(uv) - 0.5;
                
                // Forma de losango duro
                float d = abs(grid.x) + abs(grid.y);
                float diamond = step(0.4, d); 
                
                // Quadrados que expandem e contraem dentro e fora
                float sqDist = max(abs(grid.x), abs(grid.y));
                float squares = step(0.1, abs(sin(sqDist * 30.0 - time * 4.0))); 
                
                // Paleta de Cores Psicadélica e Vibrante
                vec3 c1 = vec3(1.0, 0.1, 0.6); // Rosa Néon
                vec3 c2 = vec3(0.0, 0.9, 0.8); // Ciano
                vec3 c3 = vec3(0.9, 0.8, 0.0); // Amarelo
                vec3 c4 = vec3(0.3, 0.0, 0.8); // Roxo Profundo
                
                // Mistura geométrica de cores
                vec3 psychColor = mix(c1, c2, step(0.0, sin(vUv.x * 15.0 + time)));
                psychColor = mix(psychColor, c3, diamond);
                psychColor = mix(psychColor, c4, squares * (1.0 - diamond));
                
                // Substituto da cor base pelo padrão psicadélico
                diffuseColor.rgb = mix(diffuseColor.rgb, psychColor, 0.85);
                `
            );
        };

        const rug = new THREE.Mesh(rugGeo, rugMat);
        rug.position.y = 0.025;
        rug.receiveShadow = true;
        scene.add(rug);

        // 8. Construção da TV (Gabinete Marrom - Estilo CRT)
        const tvGroup = new THREE.Group();

        const rackGeo = new THREE.BoxGeometry(4.5, 0.8, 3.5);
        const rackMat = new THREE.MeshStandardMaterial({ 
            color: 0x3d2314, 
            roughness: 0.8 
        });
        const rack = new THREE.Mesh(rackGeo, rackMat);
        rack.position.set(0, 0.4, -0.8); 
        rack.castShadow = true;
        rack.receiveShadow = true;
        tvGroup.add(rack);

        const tvMat = new THREE.MeshStandardMaterial({ 
            color: 0x2a160b, 
            roughness: 0.7
        });

        const tvFrontGeo = new THREE.BoxGeometry(3.6, 2.4, 0.6);
        const tvFront = new THREE.Mesh(tvFrontGeo, tvMat);
        tvFront.position.set(0, 2.0, 0);
        tvFront.castShadow = true;
        tvFront.receiveShadow = true;
        tvGroup.add(tvFront);

        const tvMidGeo = new THREE.BoxGeometry(3.2, 2.0, 1.2);
        const tvMid = new THREE.Mesh(tvMidGeo, tvMat);
        tvMid.position.set(0, 2.0, -0.9);
        tvMid.castShadow = true;
        tvMid.receiveShadow = true;
        tvGroup.add(tvMid);

        const tvBackGeo = new THREE.BoxGeometry(2.0, 1.4, 1.2);
        const tvBack = new THREE.Mesh(tvBackGeo, tvMat);
        tvBack.position.set(0, 2.0, -2.1);
        tvBack.castShadow = true;
        tvBack.receiveShadow = true;
        tvGroup.add(tvBack);

        const frameGeo = new THREE.BoxGeometry(3.2, 2.0, 0.85);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
        const frame = new THREE.Mesh(frameGeo, frameMat);
        frame.position.set(0, 2.0, 0);
        tvGroup.add(frame);

        const screenGeo = new THREE.PlaneGeometry(3.0, 1.8);
        const screenMat = new THREE.MeshStandardMaterial({ 
            color: 0x050505, 
            roughness: 0.8
        });
        const screen = new THREE.Mesh(screenGeo, screenMat);
        screen.position.set(0, 2.0, 0.43); 
        tvGroup.add(screen);

        const divInfo = document.createElement('div');
        divInfo.style.width = '480px'; 
        divInfo.style.height = '288px'; 
        divInfo.style.backgroundColor = '#000';

        const iframe = document.createElement('iframe');
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.border = '0';
        iframe.style.pointerEvents = 'auto'; 
        iframe.src = 'https://www.youtube.com/embed/yVWU6NyW0mU?list=RDyVWU6NyW0mU&autoplay=1&rel=0';
        iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
        iframe.allowFullscreen = true;
        divInfo.appendChild(iframe);

        const cssObject = new CSS3DObject(divInfo);
        cssObject.scale.set(0.00625, 0.00625, 0.00625);
        cssObject.position.set(0, 2.0, 0.44); 
        tvGroup.add(cssObject);

        const tvLight = new THREE.PointLight(0x4488ff, 2.0, 15);
        tvLight.position.set(0, 2.0, 1.0);
        tvLight.castShadow = true;
        tvGroup.add(tvLight);

        scene.add(tvGroup);

        // 9. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();

            if (rugMat.userData.shader) {
                rugMat.userData.shader.uniforms.time.value = time;
            }

            const pulse = Math.sin(time * 3);
            beamLight.intensity = 30.0 + pulse * 10.0;
            beamMat.uniforms.beamOpacity.value = 0.08 + pulse * 0.03;

            const flicker = Math.random() * 0.15;
            tvLight.intensity = 1.5 + flicker * 3;

            controls.update();
            renderer.render(scene, camera);
            cssRenderer.render(scene, camera); 
        }

        // 10. Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start animation loop
        window.onload = () => {
            animate();
        };

    </script>
</body>
</html>
