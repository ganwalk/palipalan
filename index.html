<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Palipalan — Campo Surrealista</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Tahoma', sans-serif;
      overflow: hidden;
      height: 100vh; width: 100vw;
      user-select: none;
      cursor: crosshair;
      background: #1a0a2e;
    }

    /* ── SVG filter defs (invisible) ── */
    #filter-defs { position:absolute; width:0; height:0; overflow:hidden; }

    /* ── HYLICS sky: deep mauve/violet gradient ── */
    #sky {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        #0d0020 0%,
        #2a0050 18%,
        #5c0a7a 36%,
        #8a1a9e 52%,
        #c04ab4 66%,
        #e060a0 78%,
        #f09060 90%,
        #f8c878 100%
      );
    }

    /* ── Dither overlay (HYLICS ordered-dither feel) ── */
    #dither-overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(0,0,0,0.28) 1px, transparent 1px);
      background-size: 3px 3px;
      z-index: 1;
    }

    /* ── Cosmic floating elements ── */
    #cosmos {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    /* ── Ground SVG ── */
    #ground-svg {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%; height: 55%;
      pointer-events: none;
      z-index: 3;
    }

    /* ── Plants layer ── */
    #plants-layer {
      position: absolute; inset: 0;
      z-index: 4;
    }

    /* ── Click / strum zone ── */
    #clickzone {
      position: absolute; inset: 0;
      z-index: 5;
    }

    /* ── HYLICS-style taskbar ── */
    #taskbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 32px;
      background: #1a0030;
      border-top: 2px solid #ff00cc;
      z-index: 100;
      display: flex; align-items: center; padding: 0 6px; gap: 6px;
    }

    #start-btn {
      background: linear-gradient(to bottom, #ff00cc, #8800aa);
      border: 2px solid #000;
      border-radius: 0;
      color: #fff;
      font-weight: bold; font-size: 11px;
      padding: 2px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      image-rendering: pixelated;
    }
    #start-btn:hover { background: linear-gradient(to bottom, #ff44dd, #aa00cc); }

    #chord-display {
      flex: 1; color: #ff00cc; font-size: 11px;
      text-align: center; letter-spacing: 2px;
      text-shadow: 0 0 8px #ff00cc, 0 0 16px #ff00cc;
      font-weight: bold;
    }

    #clock {
      color: #00ffcc; font-size: 11px;
      text-shadow: 0 0 6px #00ffcc;
      padding: 2px 6px;
    }

    /* ── HYLICS panel ── */
    #panel {
      position: fixed;
      bottom: 38px; right: 10px;
      width: 276px;
      background: #0d0020;
      border: 3px solid #ff00cc;
      z-index: 50;
      display: none;
      font-size: 11px;
      image-rendering: pixelated;
    }
    #panel.open { display: block; }

    #panel-title {
      background: linear-gradient(to right, #ff00cc, #8800aa, #ff00cc);
      color: #fff; font-weight: bold; font-size: 12px;
      padding: 4px 8px; letter-spacing: 2px;
      text-transform: uppercase;
      display: flex; justify-content: space-between; align-items: center;
      cursor: move;
      text-shadow: 1px 1px 0 #000;
    }

    #panel-close {
      background: #ff0044; border: 2px solid #000;
      color: #fff; width: 18px; height: 16px;
      font-size: 10px; font-weight: bold;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    #panel-body {
      padding: 8px;
      display: flex; flex-direction: column; gap: 5px;
      max-height: 400px; overflow-y: auto;
    }
    #panel-body::-webkit-scrollbar { width: 6px; }
    #panel-body::-webkit-scrollbar-track { background: #0d0020; }
    #panel-body::-webkit-scrollbar-thumb { background: #ff00cc; }

    .param-group {
      background: #1a003a;
      border: 2px solid #5500aa;
      padding: 6px;
    }

    .param-group h3 {
      font-size: 10px; font-weight: bold;
      color: #ff00cc; margin-bottom: 4px;
      letter-spacing: 2px; text-transform: uppercase;
      text-shadow: 0 0 4px #ff00cc;
    }

    .param-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 4px; gap: 5px;
    }

    .param-row label { flex:1; font-size:10px; color:#cc88ff; }

    .param-row input[type=range] {
      flex: 2; height: 12px;
      accent-color: #ff00cc;
    }

    .param-row .val {
      width: 30px; text-align: right;
      font-size: 10px; color: #00ffcc;
    }

    .param-row select {
      flex: 2; font-size: 10px;
      border: 1px solid #ff00cc;
      background: #0d0020; color: #ff88dd;
      padding: 1px 2px;
    }

    .param-row input[type=checkbox] { accent-color: #ff00cc; }

    #btn-clear {
      background: #ff0044; border: 2px solid #000;
      color: #fff; font-size: 10px;
      padding: 4px 8px; cursor: pointer;
      width: 100%; letter-spacing: 2px;
      text-transform: uppercase; font-weight: bold;
    }
    #btn-clear:hover { background: #ff3366; }

    /* ── Palipalan plant wrappers ── */
    .palipalan {
      position: absolute;
      pointer-events: all;  /* needed for strum hover */
      transform-origin: 50% 95%;
      cursor: none;
    }

    .palipalan.sway {
      animation: sway var(--sway-dur, 2.2s) ease-in-out infinite;
    }

    @keyframes sway {
      0%,100% { transform: rotate(0deg) scaleX(1); }
      25%      { transform: rotate(calc(var(--sway-amt,2) * 1deg)) scaleX(1.01); }
      75%      { transform: rotate(calc(var(--sway-amt,2) * -1deg)) scaleX(0.99); }
    }

    .sway-hit {
      animation: sway-hit 0.7s ease-in-out forwards !important;
    }
    @keyframes sway-hit {
      0%   { transform: rotate(0deg) scaleX(1); }
      15%  { transform: rotate(-12deg) scaleX(1.05); }
      40%  { transform: rotate(9deg)  scaleX(0.96); }
      65%  { transform: rotate(-4deg) scaleX(1.02); }
      100% { transform: rotate(0deg) scaleX(1); }
    }

    /* grow-in */
    @keyframes grow-in {
      0%   { transform: scaleY(0) rotate(-5deg); opacity:0; }
      70%  { transform: scaleY(1.08) rotate(3deg); opacity:1; }
      100% { transform: scaleY(1) rotate(0deg); opacity:1; }
    }
    .growing { animation: grow-in 0.5s cubic-bezier(.22,1,.36,1) both; }

    /* ── Note label ── */
    .note-flash {
      position: absolute; pointer-events: none;
      color: #fff; font-size: 16px; font-weight: bold;
      text-shadow: 0 0 6px #ff00cc, 0 0 14px #ff00cc, 0 0 2px #000;
      animation: note-up 1.1s ease-out forwards;
      z-index: 30; letter-spacing: 1px;
    }
    @keyframes note-up {
      0%   { opacity:1; transform: translateY(0)   scale(1); }
      100% { opacity:0; transform: translateY(-55px) scale(1.5); }
    }

    /* ── Strum ripple ── */
    .strum-ripple {
      position: absolute; border-radius: 50%; pointer-events: none;
      border: 2px solid #ff00cc;
      animation: ripple-out 0.5s ease-out forwards;
      z-index: 25;
      box-shadow: 0 0 8px #ff00cc;
    }
    @keyframes ripple-out {
      0%   { width:0; height:0; opacity:0.9; margin:0; }
      100% { width:60px; height:60px; opacity:0; margin:-30px; }
    }

    /* ── Floating cosmic element animations ── */
    @keyframes float-drift {
      0%,100% { transform: translateY(0) rotate(0deg); }
      33%      { transform: translateY(-18px) rotate(4deg); }
      66%      { transform: translateY(10px) rotate(-3deg); }
    }
    @keyframes eye-blink {
      0%,90%,100% { transform: scaleY(1); }
      95%          { transform: scaleY(0.05); }
    }
    @keyframes orb-pulse {
      0%,100% { transform: scale(1); opacity:0.7; }
      50%      { transform: scale(1.12); opacity:1; }
    }
    @keyframes checker-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<!-- ── SVG filter definitions ── -->
<svg id="filter-defs" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Wobbly clay displacement on whole scene -->
    <filter id="scene-wobble" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.008 0.012"
        numOctaves="3" result="noise" seed="7">
        <animate attributeName="seed" values="0;200;0" dur="18s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise"
        scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Per-plant wobble -->
    <filter id="plant-clay" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="n">
        <animate attributeName="baseFrequency" values="0.04;0.065;0.04" dur="4s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.5"
        xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Glow filter for plants -->
    <filter id="plant-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Checkerboard pattern for ground -->
    <pattern id="checker" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#0f1f04"/>
      <rect x="4" y="4" width="4" height="4" fill="#0f1f04"/>
      <rect x="4" y="0" width="4" height="4" fill="#1a3508"/>
      <rect x="0" y="4" width="4" height="4" fill="#1a3508"/>
    </pattern>
    <!-- Stripe pattern for hill mid -->
    <pattern id="stripes" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#2d1048"/>
      <rect y="3" width="6" height="3" fill="#1a0830"/>
    </pattern>
  </defs>
</svg>

<div id="sky"></div>
<div id="dither-overlay"></div>

<!-- Cosmic floating elements -->
<div id="cosmos"></div>

<!-- Ground landscape -->
<svg id="ground-svg" viewBox="0 0 1440 320" preserveAspectRatio="none"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Distant hill (purple-dark) -->
  <path d="M0,180 C220,120 440,100 680,135 C900,165 1100,115 1340,145 C1400,152 1440,148 1440,150 L1440,320 L0,320 Z"
        fill="url(#stripes)" opacity="0.9"/>
  <path d="M0,180 C220,120 440,100 680,135 C900,165 1100,115 1340,145 C1400,152 1440,148 1440,150 L1440,320 L0,320 Z"
        fill="none" stroke="#ff00cc" stroke-width="1.2" opacity="0.5"/>

  <!-- Mid hill (dark teal-green checkerboard) -->
  <path d="M0,230 C160,190 340,178 560,205 C780,232 980,185 1200,210 C1340,224 1420,218 1440,220 L1440,320 L0,320 Z"
        fill="url(#checker)"/>
  <path d="M0,230 C160,190 340,178 560,205 C780,232 980,185 1200,210 C1340,224 1420,218 1440,220 L1440,320 L0,320 Z"
        fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>

  <!-- Foreground ground (darkest, solid) -->
  <path d="M0,275 C200,248 420,238 680,262 C920,284 1120,248 1340,268 C1400,274 1440,270 1440,272 L1440,320 L0,320 Z"

  <rect x="0" y="295" width="1440" height="25" fill="#060e02"/>

<div id="plants-layer"></div>

<div id="taskbar">
  <button id="start-btn" onclick="togglePanel()">⬛ PARAMS</button>
  <span id="chord-display">※ CLIQUE PARA INVOCAR PALIPALANS ※</span>
  <span id="clock">00:00</span>

<!-- HYLICS Parameter Panel -->
<div id="panel">
  <div id="panel-title">
    <span>※ OMNICHORD CERRADO ※</span>
    <button id="panel-close" onclick="togglePanel()">✕</button>
  </div>
  <div id="panel-body">

    <div class="param-group">

      <div class="param-row">

        <input type="range" id="decay" min="50" max="2000" value="400" step="10"
               oninput="syncVal(this,'decayVal')"/>
        <span class="val" id="decayVal">400</span>
      </div>
      <div class="param-row">
        <label>Sustain</label>
        <input type="range" id="sustain" min="0" max="1" value="0.5" step="0.01"

      </div>
      <div class="param-row">
        <label>Release (ms)</label>
        <input type="range" id="release" min="100" max="5000" value="1800" step="50"
               oninput="syncVal(this,'releaseVal')"/>
        <span class="val" id="releaseVal">1800</span>
      </div>
      <div class="param-row">
        <label>Reverb</label>
        <input type="range" id="reverb" min="0" max="1" value="0.55" step="0.01"

      <div class="param-row">

    <div class="param-group">
      <h3>Campo & Strum</h3>
      <div class="param-row">
        <label>Oitava base</label>
        <input type="range" id="baseOctave" min="2" max="6" value="4" step="1"

        <span class="val" id="baseOctaveVal">4</span>
      </div>
      <div class="param-row">

        <input type="range" id="octaveSpan" min="1" max="4" value="2" step="1"

      <div class="param-row">

        <input type="range" id="windSpeed" min="0.1" max="4" value="1" step="0.1"

<script>
// ══════════════════════════════════════════════════════════
//  AUDIO ENGINE
// ══════════════════════════════════════════════════════════
let ctx = null, reverbNode = null, masterGain = null, reverbGain = null, dryGain = null;

function ensureCtx() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = ctx.createGain();
  masterGain.gain.value = 0.65;
  masterGain.connect(ctx.destination);
  reverbNode = ctx.createConvolver();
  reverbNode.buffer = makeImpulse(3.2, 3.8);
  dryGain    = ctx.createGain();
  reverbGain = ctx.createGain();
  dryGain.connect(masterGain);
  reverbGain.connect(masterGain);
  reverbNode.connect(reverbGain);
  updateReverb();
}

function makeImpulse(dur, decay) {
  const sr = ctx.sampleRate, len = sr * dur;
  const buf = ctx.createBuffer(2, len, sr);
  for (let c = 0; c < 2; c++) {
    const ch = buf.getChannelData(c);
    for (let i = 0; i < len; i++)
      ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  return buf;
}

function updateReverb() {
  if (!dryGain) return;
  const rv = parseFloat(document.getElementById('reverb').value);
  reverbGain.gain.value = rv;
  dryGain.gain.value = 1 - rv * 0.5;
}

// Full note (when planting)
function playTone(freq, startTime, duration) {
  const wf  = document.getElementById('waveform').value;
  const att = parseFloat(document.getElementById('attack').value)  / 1000;
  const dec = parseFloat(document.getElementById('decay').value)   / 1000;
  const sus = parseFloat(document.getElementById('sustain').value);
  const rel = parseFloat(document.getElementById('release').value) / 1000;
  const dt  = parseFloat(document.getElementById('detune').value);
  _spawnOsc(freq, wf, att, dec, sus, rel, 0.32, duration, startTime, 0);
  if (dt > 0) _spawnOsc(freq, wf, att, dec, sus, rel, 0.16, duration, startTime, dt);
}

// Short strum pluck (when swiping)
function playStrum(freq) {
  if (!ctx) return;
  const wf  = document.getElementById('waveform').value;
  const dt  = parseFloat(document.getElementById('detune').value);
  const now = ctx.currentTime;
  _spawnOsc(freq, wf, 0.002, 0.18, 0.2, 0.45, 0.28, 0.22, now, 0);
  if (dt > 0) _spawnOsc(freq, wf, 0.002, 0.18, 0.2, 0.45, 0.14, 0.22, now, dt);
}

function _spawnOsc(freq, wf, att, dec, sus, rel, vol, dur, t, detuneCents) {
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + att);
  g.gain.linearRampToValueAtTime(vol * sus, t + att + dec);
  g.gain.setValueAtTime(vol * sus, t + dur);
  g.gain.linearRampToValueAtTime(0, t + dur + rel);
  g.connect(dryGain);
  g.connect(reverbNode);
  const o = ctx.createOscillator();
  o.type = wf;
  o.frequency.value = freq;
  o.detune.value = detuneCents;
  o.connect(g);
  o.start(t);
  o.stop(t + dur + rel + 0.1);
}

// ══════════════════════════════════════════════════════════
//  SCALE / CHORD LOGIC
// ══════════════════════════════════════════════════════════
const SCALES = {
  major:      [0,2,4,5,7,9,11],
  dorian:     [0,2,3,5,7,9,10],
  mixolydian: [0,2,4,5,7,9,10],
  lydian:     [0,2,4,6,7,9,11],
  pentatonic: [0,2,4,7,9],
  whole:      [0,2,4,6,8,10],
};

const CHORD_INTERVALS = {
  triad:       [0,2,4],
  seventh:     [0,2,4,6],
  ninth:       [0,2,4,6,8],
  eleventh:    [0,2,4,6,8,10],
  thirteenth:  [0,2,4,6,8,10,12],
};

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function semitoneToFreq(s) { return 440 * Math.pow(2, (s - 69) / 12); }

function getScaleDegree(index) {
  const scale = SCALES[document.getElementById('scale').value];
  const root  = parseInt(document.getElementById('root').value);
  const base  = parseInt(document.getElementById('baseOctave').value);
  const span  = parseInt(document.getElementById('octaveSpan').value);
  const deg   = index % scale.length;
  const oct   = Math.min(Math.floor(index / scale.length), span - 1);
  return (base + oct) * 12 + root + scale[deg];
}

function buildChord(anchorMidi) {
  const scale   = SCALES[document.getElementById('scale').value];
  const ext     = document.getElementById('chordExt').value;
  const density = parseInt(document.getElementById('chordDensity').value);
  const root    = parseInt(document.getElementById('root').value);
  const base    = parseInt(document.getElementById('baseOctave').value);
  const ivs     = CHORD_INTERVALS[ext];
  const count   = Math.min(density, ivs.length);
  const aOct    = Math.floor((anchorMidi - root) / 12);
  const aCls    = (anchorMidi - root + 120) % 12;

  let nearest = 0, minD = 999;
  for (let i = 0; i < scale.length; i++) {
    const d = Math.abs(scale[i] - aCls);
    if (d < minD) { minD = d; nearest = i; }
  }

  const freqs = [], labels = [];
  for (let i = 0; i < count; i++) {
    const di  = ivs[i];
    const idx = (nearest + di) % scale.length;
    const ob  = Math.floor((nearest + di) / scale.length);
    const m   = (base + aOct + ob) * 12 + root + scale[idx];
    freqs.push(semitoneToFreq(m));
    labels.push(NOTE_NAMES[(root + scale[idx]) % 12]);
  }
  return { freqs, labels };
}

// ══════════════════════════════════════════════════════════
//  HYLICS COLOR PALETTE
// ══════════════════════════════════════════════════════════
const HYLICS_PALETTE = [
  { fill:'#ff1aff', dark:'#880088', light:'#ffaaff', eye:'#000022' }, // magenta
  { fill:'#00ffcc', dark:'#007755', light:'#aaffee', eye:'#001a10' }, // teal
  { fill:'#ffee00', dark:'#998800', light:'#fff9aa', eye:'#1a1400' }, // yellow
  { fill:'#ff4400', dark:'#882200', light:'#ffaa88', eye:'#200800' }, // orange
  { fill:'#aa00ff', dark:'#550088', light:'#dd88ff', eye:'#0e0020' }, // violet
  { fill:'#00ff44', dark:'#007722', light:'#aaffcc', eye:'#001a0a' }, // lime
  { fill:'#ff0066', dark:'#880033', light:'#ff88bb', eye:'#1a0010' }, // hot pink
  { fill:'#00ccff', dark:'#006688', light:'#88eeff', eye:'#001220' }, // sky blue
];

// ══════════════════════════════════════════════════════════
//  PLANT SVG (HYLICS STYLE)
// ══════════════════════════════════════════════════════════
let rng; // seeded per plant

function blobPath(cx, cy, r, n, rough) {
  // Generate smooth lumpy blob
  const radii = Array.from({length:n}, () => r * (1 + (Math.random()-0.5)*rough));
  const pts   = radii.map((ri, i) => {
    const a = (i/n)*Math.PI*2 - Math.PI/2;
    return [cx + Math.cos(a)*ri, cy + Math.sin(a)*ri];
  });
  let d = `M${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`;
  for (let i = 0; i < n; i++) {
    const p = pts[i], q = pts[(i+1)%n];
    const mx = (p[0]+q[0])/2, my = (p[1]+q[1])/2;
    d += ` Q${p[0].toFixed(2)},${p[1].toFixed(2)} ${mx.toFixed(2)},${my.toFixed(2)}`;
  }
  return d + ' Z';
}

function makePalipalanSVG(size, colorIdx) {
  const col   = HYLICS_PALETTE[colorIdx % HYLICS_PALETTE.length];
  const rays  = 18 + Math.floor(Math.random() * 14);   // 18-31 rays
  const R     = 22 + Math.random() * 10;
  const hcx   = 40, hcy = 44;  // head center in viewBox 80x200
  const tilt  = (Math.random()-0.5) * 18;
  const hasEye2 = Math.random() > 0.4;

  let s = `<svg xmlns="http://www.w3.org/2000/svg"
    width="${size}" height="${size*2.5}"
    viewBox="0 0 80 200" style="overflow:visible"
    transform="rotate(${tilt.toFixed(1)})">`;

  // ── Thick chunky stem ──
  const sw = (Math.random()-0.5)*6, sh = (Math.random()-0.5)*4;
  s += `<path d="M${hcx},${hcy+R*0.8} Q${hcx+sw},${hcy+60+sh} ${hcx+sw*1.4},190"
    fill="none" stroke="${col.dark}" stroke-width="5" stroke-linecap="round"/>`;
  s += `<path d="M${hcx},${hcy+R*0.8} Q${hcx+sw},${hcy+60+sh} ${hcx+sw*1.4},190"
    fill="none" stroke="${col.fill}" stroke-width="3" stroke-linecap="round"/>`;

  // ── Stem leaf bumps ──
  for (let i = 0; i < 2; i++) {
    const ly = hcy + 65 + i*45 + Math.random()*20;
    const side = (i%2 === 0 ? 1 : -1) * (8 + Math.random()*8);
    const bp = blobPath(hcx+side, ly, 5+Math.random()*3, 7, 0.5);
    s += `<path d="${bp}" fill="${col.fill}" stroke="#000" stroke-width="2"/>`;
  }

  // ── Ray spines (thick, outlined) ──
  for (let i = 0; i < rays; i++) {
    const a    = (i/rays)*Math.PI*2 + (Math.random()-0.5)*0.2;
    const rLen = R * (0.65 + Math.random()*0.38);
    const x1   = hcx + Math.cos(a)*5, y1 = hcy + Math.sin(a)*5;
    const x2   = hcx + Math.cos(a)*rLen, y2 = hcy + Math.sin(a)*rLen;
    const mx   = hcx + Math.cos(a)*rLen*0.5 + (Math.random()-0.5)*5;
    const my   = hcy + Math.sin(a)*rLen*0.5 + (Math.random()-0.5)*5;
    const tipR = 2.4 + Math.random()*2;

    // Black outline
    s += `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} Q${mx.toFixed(1)},${my.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}"
      fill="none" stroke="#000" stroke-width="${(2.5+Math.random()).toFixed(1)}" stroke-linecap="round"/>`;
    // Colored ray
    s += `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} Q${mx.toFixed(1)},${my.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}"
      fill="none" stroke="${col.fill}" stroke-width="${(1.2+Math.random()*0.8).toFixed(1)}" stroke-linecap="round"/>`;

    // Chunky bud tip (HYLICS rounded nub) - black outline + fill
    s += `<circle cx="${x2.toFixed(1)}" cy="${y2.toFixed(1)}" r="${(tipR+1.2).toFixed(1)}" fill="#000"/>`;
    s += `<circle cx="${x2.toFixed(1)}" cy="${y2.toFixed(1)}" r="${tipR.toFixed(1)}" fill="${col.light}"/>`;
  }

  // ── Lumpy blob head ──
  const headPath  = blobPath(hcx, hcy, R*0.82, 14, 0.45);
  const head2Path = blobPath(hcx, hcy, R*0.56, 10, 0.3);

  s += `<path d="${headPath}" fill="#000" stroke="#000" stroke-width="3"/>`;
  s += `<path d="${headPath}" fill="${col.fill}" stroke="#000" stroke-width="2.5"/>`;
  s += `<path d="${head2Path}" fill="${col.dark}" stroke="#000" stroke-width="1.5" opacity="0.7"/>`;

  // ── Eyes (HYLICS dot eyes — slightly uneven) ──
  const eo = R * 0.28;
  const el = 3.5 + Math.random()*1.5;
  const er = 3.2 + Math.random()*1.5;
  const eyOff = (Math.random()-0.5)*3;
  // Left eye
  s += `<ellipse cx="${(hcx-eo*0.9).toFixed(1)}" cy="${(hcy+eyOff-2).toFixed(1)}"
    rx="${(el+1).toFixed(1)}" ry="${(el+1.2).toFixed(1)}" fill="#fff" stroke="#000" stroke-width="1.5"/>`;
  s += `<ellipse cx="${(hcx-eo*0.9).toFixed(1)}" cy="${(hcy+eyOff-2).toFixed(1)}"
    rx="${el.toFixed(1)}" ry="${(el*1.1).toFixed(1)}" fill="${col.eye}"/>`;
  s += `<circle cx="${(hcx-eo*0.9+1).toFixed(1)}" cy="${(hcy+eyOff-3).toFixed(1)}" r="1" fill="#fff" opacity="0.7"/>`;
  // Right eye (or single big eye randomly)
  if (hasEye2) {
    s += `<ellipse cx="${(hcx+eo*0.9).toFixed(1)}" cy="${(hcy+eyOff-1).toFixed(1)}"
      rx="${(er+1).toFixed(1)}" ry="${(er+1.2).toFixed(1)}" fill="#fff" stroke="#000" stroke-width="1.5"/>`;
    s += `<ellipse cx="${(hcx+eo*0.9).toFixed(1)}" cy="${(hcy+eyOff-1).toFixed(1)}"
      rx="${er.toFixed(1)}" ry="${(er*1.1).toFixed(1)}" fill="${col.eye}"/>`;
    s += `<circle cx="${(hcx+eo*0.9+1).toFixed(1)}" cy="${(hcy+eyOff-2).toFixed(1)}" r="0.9" fill="#fff" opacity="0.7"/>`;
  } else {
    // Single cyclopean eye, bigger
    s += `<ellipse cx="${hcx}" cy="${(hcy+eyOff-1).toFixed(1)}" rx="${(el+3).toFixed(1)}" ry="${(el+3.5).toFixed(1)}"
      fill="#fff" stroke="#000" stroke-width="1.5"/>`;
    s += `<ellipse cx="${hcx}" cy="${(hcy+eyOff-1).toFixed(1)}" rx="${(el+2).toFixed(1)}" ry="${(el+2.5).toFixed(1)}"
      fill="${col.eye}"/>`;
    s += `<circle cx="${(hcx+1.5)}" cy="${(hcy+eyOff-3)}" r="1.4" fill="#fff" opacity="0.7"/>`;
  }

  // ── Mouth (small arc or scallop) ──
  const mx0 = hcx - 5 + Math.random()*2, mx1 = hcx + 5 - Math.random()*2;
  const myBase = hcy + R*0.38;
  const moodY  = myBase + (Math.random() > 0.5 ? 3 : -3);
  s += `<path d="M${mx0.toFixed(1)},${myBase.toFixed(1)} Q${hcx},${moodY.toFixed(1)} ${mx1.toFixed(1)},${myBase.toFixed(1)}"
    fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>`;

  // ── Glowing center spot ──
  s += `<circle cx="${hcx}" cy="${hcy}" r="2.5" fill="${col.light}" opacity="0.85"/>`;

  s += `</svg>`;
  return s;
}

// ══════════════════════════════════════════════════════════
//  PLANTS MANAGEMENT
// ══════════════════════════════════════════════════════════
let plants = [];
let colorCursor = 0;

function addPlant(x, y, midi) {
  const max = parseInt(document.getElementById('maxPlants').value);
  if (plants.length >= max) {
    const old = plants.shift();
    if (old.el && old.el.parentNode) old.el.parentNode.removeChild(old.el);
  }

  const yFrac = Math.max(0, Math.min(1, y / window.innerHeight));
  const size  = 16 + yFrac * 50 + Math.random() * 20;
  const cidx  = colorCursor++ % HYLICS_PALETTE.length;
  const freq  = semitoneToFreq(midi);

  const wrapper = document.createElement('div');
  wrapper.className = 'palipalan sway growing';

  // Position: anchor stem base at click point
  wrapper.style.left = `${x - size / 2}px`;
  wrapper.style.top  = `${y - size * 2.5 * 0.26}px`;
  wrapper.style.width  = `${size}px`;
  wrapper.style.height = `${size * 2.5}px`;

  // Wind sway params as CSS vars
  const ws  = parseFloat(document.getElementById('windSpeed').value);
  const dur = (1.5 + Math.random() * 2) / ws;
  const amt = 1.5 + Math.random() * 3;
  wrapper.style.setProperty('--sway-dur', `${dur}s`);
  wrapper.style.setProperty('--sway-amt', `${amt}`);
  wrapper.style.animationDelay = `${Math.random() * 0.6}s`;

  // Apply clay wobble filter on SVG children
  wrapper.style.filter = `drop-shadow(0 0 8px ${HYLICS_PALETTE[cidx].fill}aa)
    drop-shadow(0 0 2px #000)`;

  wrapper.innerHTML = makePalipalanSVG(size, cidx);

  const plant = { el: wrapper, midi, freq, x, y, lastStrum: 0 };

  // ── STRUM on hover/pointer ──
  wrapper.addEventListener('pointerenter', () => strumPlant(plant));
  // Also touchmove is handled globally below

  document.getElementById('plants-layer').appendChild(wrapper);

  // Remove 'growing' after animation ends so sway resumes
  wrapper.addEventListener('animationend', (e) => {
    if (e.animationName === 'grow-in') wrapper.classList.remove('growing');
  }, { once: true });

  plants.push(plant);
  return plant;
}

function strumPlant(plant) {
  if (!ctx) return;
  const cooldown = parseInt(document.getElementById('strumCooldown').value);
  const now = performance.now();
  if (now - plant.lastStrum < cooldown) return;
  plant.lastStrum = now;

  playStrum(plant.freq);
  spawnStrumRipple(plant.x, plant.y);

  // Sway hit animation
  if (plant.el) {
    plant.el.classList.remove('sway-hit');
    void plant.el.offsetWidth; // reflow
    plant.el.classList.add('sway-hit');
    plant.el.addEventListener('animationend', () => {
      plant.el && plant.el.classList.remove('sway-hit');
      plant.el && plant.el.classList.add('sway');
    }, { once: true });
  }
}

// ── Global touchmove strum (finger drag) ──
document.addEventListener('touchmove', (e) => {
  if (!ctx) return;
  for (const touch of e.touches) {
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el) continue;
    for (const p of plants) {
      if (p.el && (p.el === el || p.el.contains(el))) {
        strumPlant(p);
      }
    }
  }
}, { passive: true });

// ══════════════════════════════════════════════════════════
//  VISUAL FEEDBACK
// ══════════════════════════════════════════════════════════
function spawnNoteLabel(x, y, label) {
  const el = document.createElement('div');
  el.className = 'note-flash';
  el.textContent = label;
  el.style.left = `${x - 10}px`;
  el.style.top  = `${y - 28}px`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function spawnStrumRipple(x, y) {
  const el = document.createElement('div');
  el.className = 'strum-ripple';
  el.style.left = `${x}px`;
  el.style.top  = `${y}px`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ══════════════════════════════════════════════════════════
//  MAIN CLICK — PLANT + CHORD
// ══════════════════════════════════════════════════════════
let clickCount = 0;

document.getElementById('clickzone').addEventListener('click', async (e) => {
  ensureCtx();
  if (ctx.state === 'suspended') await ctx.resume();
  updateReverb();

  const x = e.clientX, y = e.clientY;
  clickCount++;

  const midi = getScaleDegree((clickCount - 1) % 64);
  const { freqs, labels } = buildChord(midi);

  const plant = addPlant(x, y, midi);
  spawnNoteLabel(x, y - 22, labels[0] || NOTE_NAMES[midi % 12]);

  // Sympathetic sway on nearby plants
  for (const p of plants) {
    const d = Math.hypot(p.x - x, p.y - y);
    if (d < 200 && p !== plant && p.el) {
      setTimeout(() => {
        if (!p.el) return;
        p.el.classList.remove('sway-hit');
        void p.el.offsetWidth;
        p.el.classList.add('sway-hit');
      }, d * 0.6 + Math.random()*80);
    }
  }

  // Play chord
  const now    = ctx.currentTime;
  const doArp  = document.getElementById('arpeggio').checked;
  const arpMs  = parseFloat(document.getElementById('arpSpeed').value) / 1000;
  const dur    = parseFloat(document.getElementById('decay').value) / 1000 * 1.5;

  freqs.forEach((f, i) => {
    playTone(f, now + (doArp ? i * arpMs : 0), dur);
  });

  // Chord name display
  const name = labels.length
    ? `※ ${labels[0]} — ${labels.slice(1).join(' · ')} ※`
    : '※ CLIQUE PARA INVOCAR PALIPALANS ※';
  document.getElementById('chord-display').textContent = name;
});

// ══════════════════════════════════════════════════════════
//  COSMIC BACKGROUND ELEMENTS (HYLICS-style)
// ══════════════════════════════════════════════════════════
function makeEyeball(x, y, r, fill, dur) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  el.setAttribute('width', r*2); el.setAttribute('height', r*2);
  el.setAttribute('viewBox', `0 0 ${r*2} ${r*2}`);
  el.style.cssText = `position:absolute;left:${x}px;top:${y}px;
    animation:float-drift ${dur}s ease-in-out infinite;`;

  const b = blobPath(r, r, r*0.9, 12, 0.35);
  const p = blobPath(r, r, r*0.58, 10, 0.25);
  const p2= blobPath(r, r, r*0.3, 8, 0.2);

  el.innerHTML = `
    <path d="${b}" fill="${fill}" stroke="#000" stroke-width="2.5"/>
    <path d="${p}" fill="#fff" stroke="#000" stroke-width="1.5"
      style="animation:eye-blink 4s ease-in-out infinite"/>
    <path d="${p2}" fill="#000"/>
    <circle cx="${r*1.2}" cy="${r*0.7}" r="${r*0.12}" fill="#fff" opacity="0.7"/>`;
  return el;
}

function makeCheckerOrb(x, y, r, dur) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  const d2 = r*2+8;
  el.setAttribute('width', d2); el.setAttribute('height', d2);
  el.setAttribute('viewBox', `0 0 ${d2} ${d2}`);
  el.style.cssText = `position:absolute;left:${x}px;top:${y}px;
    animation:checker-spin ${dur}s linear infinite;`;

  const cw = r/5;
  let pat = '';
  for (let cx2 = 0; cx2 < d2; cx2 += cw) {
    for (let cy2 = 0; cy2 < d2; cy2 += cw) {
      if ((Math.floor(cx2/cw)+Math.floor(cy2/cw))%2===0) {
        pat += `<rect x="${cx2}" y="${cy2}" width="${cw}" height="${cw}" fill="#ff00cc"/>`;
      }
    }
  }

  el.innerHTML = `
    <defs>
      <clipPath id="orb-clip-${x}">
        <circle cx="${r+4}" cy="${r+4}" r="${r}"/>
      </clipPath>
    </defs>
    <circle cx="${r+4}" cy="${r+4}" r="${r+1}" fill="#000"/>
    <g clip-path="url(#orb-clip-${x})">${pat}</g>
    <circle cx="${r+4}" cy="${r+4}" r="${r}" fill="none" stroke="#000" stroke-width="3"/>
    <circle cx="${r*0.7+4}" cy="${r*0.6+4}" r="${r*0.18}" fill="#fff" opacity="0.5"/>`;
  return el;
}

function makeBlob(x, y, r, fill, dur, delay) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  const d2 = r*2+6;
  el.setAttribute('width', d2); el.setAttribute('height', d2);
  el.setAttribute('viewBox', `0 0 ${d2} ${d2}`);
  el.style.cssText = `position:absolute;left:${x}px;top:${y}px;
    animation:orb-pulse ${dur}s ease-in-out infinite ${delay}s;`;

  const b1 = blobPath(r+3, r+3, r*0.92, 10, 0.4);
  const b2 = blobPath(r+3, r+3, r*0.6, 8, 0.3);

  el.innerHTML = `
    <path d="${b1}" fill="${fill}" stroke="#000" stroke-width="2.5"/>
    <path d="${b2}" fill="#000" opacity="0.4"/>`;
  return el;
}

function buildCosmos() {
  const c = document.getElementById('cosmos');
  const W = window.innerWidth, H = window.innerHeight;

  // Large floating eyeballs
  const eyeData = [
    [W*0.08, H*0.06, 38, '#ff1aff', 7],
    [W*0.85, H*0.04, 28, '#00ffcc', 9.5],
    [W*0.55, H*0.12, 22, '#ffee00', 6],
    [W*0.3,  H*0.02, 18, '#ff4400', 11],
    [W*0.72, H*0.18, 32, '#aa00ff', 8],
  ];
  for (const [x,y,r,fill,dur] of eyeData) {
    c.appendChild(makeEyeball(x-r, y-r, r, fill, dur));
  }

  // Checker orbs
  const orbData = [
    [W*0.18, H*0.15, 24, 18],
    [W*0.78, H*0.10, 30, 22],
    [W*0.48, H*0.22, 18, 15],
  ];
  for (const [x,y,r,dur] of orbData) {
    c.appendChild(makeCheckerOrb(x-r, y-r, r, dur));
  }

  // Floating blobs
  const blobData = [
    [W*0.62, H*0.08, 20, '#00ffcc', 5, 0],
    [W*0.22, H*0.22, 15, '#ff4400', 7, 1.5],
    [W*0.92, H*0.28, 22, '#ffee00', 6, 0.8],
    [W*0.38, H*0.18, 12, '#ff1aff', 8, 2],
  ];
  for (const [x,y,r,fill,dur,delay] of blobData) {
    c.appendChild(makeBlob(x-r, y-r, r, fill, dur, delay));
  }
}

buildCosmos();

// ══════════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════════
function syncVal(input, spanId) {
  document.getElementById(spanId).textContent = input.value;
  if (spanId === 'reverbVal') updateReverb();
  if (spanId === 'windSpeedVal') {
    const ws = parseFloat(input.value);
    for (const p of plants) {
      if (p.el) {
        const dur = (1.5 + Math.random()*2) / ws;
        p.el.style.setProperty('--sway-dur', `${dur}s`);
      }
    }
  }
}

function togglePanel() {
  document.getElementById('panel').classList.toggle('open');
}

function clearField() {
  const layer = document.getElementById('plants-layer');
  for (const p of plants) {
    if (p.el && p.el.parentNode) p.el.parentNode.removeChild(p.el);
  }
  plants = [];
  clickCount = 0;
  colorCursor = 0;
  document.getElementById('chord-display').textContent = '※ CLIQUE PARA INVOCAR PALIPALANS ※';
}

// Clock
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 10000);

// Draggable panel
(function() {
  const panel = document.getElementById('panel');
  const title = document.getElementById('panel-title');
  let drag = false, ox = 0, oy = 0;
  title.addEventListener('mousedown', e => {
    drag = true; ox = e.clientX - panel.offsetLeft; oy = e.clientY - panel.offsetTop;
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    panel.style.right = 'auto'; panel.style.bottom = 'auto';
    panel.style.left = `${e.clientX - ox}px`;
    panel.style.top  = `${e.clientY - oy}px`;
  });
  document.addEventListener('mouseup', () => drag = false);
})();
</script>
